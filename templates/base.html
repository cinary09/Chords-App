<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Guitar Chord Hub{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="site-header">
        <nav class="nav" aria-label="Main navigation">
            <a class="brand" href="{{ url_for('home') }}">
                <span class="brand-mark" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
                <span>Guitar Chord Hub</span>
            </a>

            <div class="nav-links">
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('about_chords') }}">Chord Basics</a>
                <a href="{{ url_for('chords') }}">Chord Library</a>
                <a href="{{ url_for('rhythms') }}">Rhythms</a>
                <a href="{{ url_for('songs') }}">Songs</a>
                <a href="{{ url_for('ear_test') }}">Ear Test</a>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div>
                <strong>Guitar Chord Hub</strong>
                <p>Beginner-friendly chords, rhythm practice, and simple song progressions.</p>
            </div>
            <div class="footer-links">
                <a href="{{ url_for('chords') }}">Browse chords</a>
                <a href="{{ url_for('rhythms') }}">Practice rhythms</a>
                <a href="{{ url_for('songs') }}">Play songs</a>
                <a href="{{ url_for('ear_test') }}">Ear test</a>
            </div>
        </div>
    </footer>
    <script src="{{ url_for('static', filename='js/audio.js') }}" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
