{% extends "base.html" %}

{% block title %}{{ error_code }} - Guitar Chord Hub{% endblock %}

{% block content %}
<section class="error-page">
    <p class="eyebrow">{{ error_code }}</p>
    <h1>{{ error_title }}</h1>
    <p>{{ error_message }}</p>
    <div class="hero-actions">
        <a class="button primary-button" href="{{ url_for('home') }}">Back to Home</a>
        <a class="button secondary-button" href="{{ url_for('chords') }}">Browse Chords</a>
    </div>
</section>
{% endblock %}
